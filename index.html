<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EntrenaConMétodo · CRM</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#606c38" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="EM CRM" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } }
  </script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

  <!-- Login -->
  <div id="login-screen" class="hidden min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg max-w-sm w-full p-7">
      <div class="text-center mb-5">
        <div class="w-12 h-12 mx-auto rounded-xl brand-badge flex items-center justify-center font-bold text-white text-lg shadow-sm">EM</div>
        <h1 class="text-xl font-bold mt-3 text-slate-900">EntrenaConMétodo</h1>
        <p class="text-sm text-slate-500">Centro de control</p>
      </div>
      <form id="login-form" class="space-y-3">
        <div>
          <label>Email</label>
          <input id="login-email" type="email" required autocomplete="username">
        </div>
        <div>
          <label>Contraseña</label>
          <input id="login-pass" type="password" required autocomplete="current-password">
        </div>
        <button class="btn btn-primary w-full" type="submit">Entrar</button>
        <p id="login-error" class="text-red-600 text-xs text-center hidden"></p>
      </form>
      <p class="text-xs text-slate-400 text-center mt-4">
        ¿Primera vez? Crea tu cuenta en Supabase<br>(Authentication → Users → Add user).
      </p>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" class="hidden">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 glass">
      <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl brand-badge flex items-center justify-center text-white font-bold shadow-sm">EM</div>
          <div>
            <h1 class="text-base font-bold text-slate-900 leading-tight">EntrenaConMétodo</h1>
            <p class="text-xs text-slate-500">Centro de control</p>
          </div>
        </div>
        <nav class="bg-slate-100 rounded-xl p-1 flex gap-1 text-sm overflow-x-auto">
          <button data-view="dashboard"   class="nav-item active px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Inicio</button>
          <button data-view="seguimiento" class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Seguimiento</button>
          <button data-view="pagos"       class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Pagos</button>
          <button data-view="pendientes"  class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Pendientes</button>
          <button data-view="clientes"    class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Clientes</button>
          <button data-view="negocio"     class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600 whitespace-nowrap">Mi negocio</button>
          <button data-view="ajustes"     class="nav-item px-3 py-1.5 rounded-lg font-medium text-slate-600">⚙</button>
        </nav>
        <button id="logout-btn" class="text-xs text-slate-500 hover:text-slate-800">Salir</button>
      </div>
    </header>
    <main class="max-w-7xl mx-auto px-6 py-6">
      <div id="view"></div>
    </main>
  </div>

  <!-- Loader inicial -->
  <div id="boot-screen" class="min-h-screen flex items-center justify-center">
    <div class="text-slate-400 text-sm">Cargando…</div>
  </div>

  <!-- Modal y toast -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
    <div id="modal-box" class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[92vh] overflow-hidden flex flex-col">
      <div id="modal-content" class="flex-1 overflow-y-auto"></div>
    </div>
  </div>
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-2 rounded-xl shadow-lg z-50 text-sm"></div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
